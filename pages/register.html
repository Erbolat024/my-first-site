<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тіркелу</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/register.css">
</head>

<body class="form-page">

  <div class="form-box">

    <img src="../images/logo.jpg" class="logo" alt="Logo">

    <h2>Тіркелу</h2>
    <p>Платформаға тіркеліп, материалдарға қол жеткізіңіз</p>

   <input type="text" id="name" placeholder="Аты-жөні" />
   <input type="text" id="phone" placeholder="Телефон номері" />
   <input type="email" id="email" placeholder="Email" />
   <input type="password" id="password" placeholder="Пароль" />

   <button onclick="registerUser()">Тіркелу</button>

    <div class="form-link">
      Аккаунтыңыз бар ма? <a href="login.html">Кіру</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/script.js"></script>

</body>
</html>
