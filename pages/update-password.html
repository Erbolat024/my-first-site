<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Жаңа пароль</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 420px;
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 14px;
      color: #1d2b53;
      font-size: 28px;
    }

    p {
      color: #6b7280;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #d6dbe7;
      font-size: 16px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #16264d;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      color: #2457ff;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Жаңа пароль</h1>
    <p>Жаңа құпия сөз енгізіңіз</p>

    <input type="password" id="new-password" placeholder="Жаңа пароль" />
    <button onclick="updatePassword()">Сақтау</button>

    <a href="login.html">Кіруге оралу</a>
  </div>

  <script>
    console.log("update-password page loaded");

    const supabaseUrl = "https://ewpouavcxepprlhppyal.supabase.co";
    const supabaseKey = "sb_publishable__L6lwv9FNWNDYeLMD1SK2g_PU6Gn-EW";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    window.updatePassword = async function () {
      console.log("updatePassword started");

      const passwordInput = document.getElementById("new-password");
      const newPassword = passwordInput.value.trim();

      if (!newPassword) {
        alert("Жаңа парольді енгізіңіз");
        return;
      }

      if (newPassword.length < 6) {
        alert("Пароль кемінде 6 символ болуы керек");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (error) {
        alert("Қате: " + error.message);
        return;
      }

      alert("Пароль сәтті жаңартылды");
      window.location.href = "login.html";
    };
  </script>
</body>
</html>
