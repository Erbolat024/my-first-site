<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email растау</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/main.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .verify-box {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .verify-box h2 {
      margin-bottom: 10px;
    }

    .verify-box p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .verify-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 18px;
      text-align: center;
      letter-spacing: 6px;
    }

    .verify-box button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #4c7cf6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .verify-box button:hover {
      background: #3b66d9;
    }

    .resend {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
    }

    .resend.disabled {
      color: #ccc;
      cursor: not-allowed;
    }

    .timer {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div class="verify-box">
    <h2>Email растау</h2>
    <p>Email-ге келген кодты енгізіңіз</p>

    <input 
      type="number" 
      id="verify-code" 
      placeholder="------" 
      maxlength="6"
    />

    <button onclick="verifyCode()">Растау</button>

    <div id="resendBtn" class="resend disabled">
      Кодты қайта жіберу
    </div>

    <div id="timer" class="timer">
      60 секунд күтіңіз
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Сенің script -->
  <script src="../js/script.js"></script>

  <script>
    let timeLeft = 60;
    const timerEl = document.getElementById("timer");
    const resendBtn = document.getElementById("resendBtn");

    const countdown = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft + " секунд күтіңіз";

      if (timeLeft <= 0) {
        clearInterval(countdown);
        timerEl.textContent = "";
        resendBtn.classList.remove("disabled");
      }
    }, 1000);

    resendBtn.onclick = async () => {
      if (resendBtn.classList.contains("disabled")) return;

      const email = localStorage.getItem("pending_email");

      if (!email) {
        alert("Email табылмады");
        return;
      }

      const { error } = await supabase.auth.resend({
        type: "signup",
        email: email
      });

      if (error) {
        alert("Қате: " + error.message);
        return;
      }

      alert("Код қайта жіберілді!");

      // қайта таймер
      timeLeft = 60;
      resendBtn.classList.add("disabled");

      const newCountdown = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft + " секунд күтіңіз";

        if (timeLeft <= 0) {
          clearInterval(newCountdown);
          timerEl.textContent = "";
          resendBtn.classList.remove("disabled");
        }
      }, 1000);
    };
  </script>

</body>
</html>
