<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email растау</title>

  <!-- CSS (өзіңдегі файл атына қарай өзгерте аласың) -->
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/main.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .verify-box {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .verify-box h2 {
      margin-bottom: 10px;
    }

    .verify-box p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .verify-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .verify-box button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4c7cf6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .verify-box button:hover {
      background: #3b66d9;
    }
  </style>
</head>

<body>

 <div class="verify-box">
  <h2>Email растау</h2>
  <p>Email-ге келген кодты енгізіңіз</p>

  <input type="text" id="verify-code" placeholder="Код" />

  <button onclick="verifyCode()">Растау</button>
</div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Сенің script -->
  <script src="../js/script.js"></script>

</body>
</html>
