<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сабақтар</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="lesson-editor.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h2 class="logo">Admin</h2>
      <ul id="menu"></ul>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1 id="page-title">Сабақтар</h1>
        <p id="page-subtitle">Пән мен бөлімді таңдап, сабақтарды басқарыңыз</p>
      </div>

      <div class="form-box top-controls">
        <div class="control-group">
          <label for="subjectSelect">Пәнді таңдау</label>
          <select id="subjectSelect">
            <option value="">Пәнді таңдаңыз</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sectionSelect">Бөлімді таңдау</label>
          <select id="sectionSelect">
            <option value="">Алдымен пәнді таңдаңыз</option>
          </select>
        </div>

        <div class="control-group">
          <label>Пән</label>
          <div id="currentSubjectBadge" class="info-badge">Таңдалмаған</div>
        </div>

        <div class="control-group">
          <label>Бөлім</label>
          <div id="currentSectionBadge" class="info-badge">Таңдалмаған</div>
        </div>

        <div class="control-group add-lesson-group">
          <label for="newLessonTitle">Жаңа сабақ атауы</label>
          <div class="inline-form">
            <input
              type="text"
              id="newLessonTitle"
              placeholder="Мысалы: Жасуша теориясы"
            />
            <button id="addLessonBtn" type="button">+ Сабақ қосу</button>
          </div>
        </div>
      </div>

      <h2>Сабақтар тізімі</h2>
      <div id="lessonsContainer" class="lessons-list">
        <p>Пән мен бөлімді таңдаңыз</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="admin-layout.js"></script>
  <script src="lesson-editor.js"></script>
</body>
</html>
