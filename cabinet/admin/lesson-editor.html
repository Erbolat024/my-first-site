<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сабақ редакторы</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="lesson-editor.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h2 class="logo">Admin</h2>
      <ul class="menu">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="users.html">Аккаунттар</a></li>
        <li><a href="access.html">Доступ</a></li>
        <li><a href="groups.html">Топтар</a></li>
        <li><a href="results.html" class="active">Нәтижелер</a></li>
        <li><a href="sections.html">Контент</a></li>
        <li><a href="../../index.html">Шығу</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Сабақ редакторы</h1>
          <p id="lessonMeta">Жүктелуде...</p>
        </div>

        <div class="top-actions">
          <a href="sections.html" class="btn secondary">← Артқа</a>
          <button id="saveLessonBtn" class="btn primary">Сақтау</button>
        </div>
      </div>

      <div id="editorContent">
        <section class="card">
          <h2>Негізгі ақпарат</h2>

          <div class="form-group">
            <label for="lessonTitle">Сабақ атауы</label>
            <input type="text" id="lessonTitle" placeholder="Сабақ атауы" />
          </div>

          <div class="form-group">
            <label for="lessonDescription">Қысқаша сипаттама</label>
            <textarea id="lessonDescription" rows="3" placeholder="Сабақтың қысқаша сипаттамасы"></textarea>
          </div>

          <div class="form-group">
            <label for="lessonVideo">Видео ссылка</label>
            <input type="text" id="lessonVideo" placeholder="https://..." />
          </div>
        </section>

        <section class="card">
          <h2>Конспект</h2>
          <div class="form-group">
            <label for="lessonContent">Сабақ мәтіні</label>
            <textarea id="lessonContent" class="big-textarea" rows="14" placeholder="Сабақ конспектін осында жазыңыз"></textarea>
          </div>
        </section>

        <section class="card">
          <div class="test-header">
            <div>
              <h2>Тест сұрақтары</h2>
              <p>Әр сұраққа 4 жауап нұсқасы және дұрыс жауап белгіленеді</p>
            </div>
            <button id="addQuestionBtn" class="btn primary">+ Сұрақ қосу</button>
          </div>

          <div id="questionsContainer" class="questions-container"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lesson-editor.js"></script> 
</body>
</html>
