<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контент</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="sections.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h2 class="logo">Admin</h2>
      <ul id="menu"></ul>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1 id="page-title">Пән бөлімдері мен сабақтар</h1>
        <p id="page-subtitle">Таңдалған пәннің бөлімдерін басқару</p>
      </div>

      <div class="form-box top-controls">
        <div class="control-group">
          <label for="subjectSelect">Пәнді таңдау</label>
          <select id="subjectSelect">
            <option value="">Пәнді таңдаңыз</option>
          </select>
        </div>

        <div class="control-group current-subject-group">
          <label>Таңдалған пән</label>
          <div id="currentSubjectBadge" class="current-subject-badge">
            Таңдалмаған
          </div>
        </div>

        <div class="control-group add-section-group">
          <label for="newSectionTitle">Жаңа бөлім атауы</label>
          <div class="inline-form">
            <input
              type="text"
              id="newSectionTitle"
              placeholder="Мысалы: Жасуша биологиясы"
            />
            <button id="addSectionBtn" type="button">+ Бөлім қосу</button>
          </div>
        </div>
      </div>

      <h2>Бөлімдер тізімі</h2>
      <div id="sectionsContainer" class="sections-list">
        <p>Пәнді таңдаңыз</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="admin-layout.js"></script>
  <script src="sections.js"></script>
</body>
</html>
