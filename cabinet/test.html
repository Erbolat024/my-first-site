<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>Тест</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f6fb;
    }

    .test-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .question {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }

    .answers button {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #eef2ff;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .answers button:hover {
      background: #dbe4ff;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .submit-btn,
    .retry-btn,
    .back-btn2 {
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      border: none;
    }

    .submit-btn {
      background: #4c7cf6;
      color: white;
    }

    .retry-btn {
      background: white;
      color: #4c7cf6;
      border: 2px solid #4c7cf6;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      color: #4c7cf6;
      font-weight: 600;
    }

    .back-btn2 {
      background: #eef2ff;
      color: #222;
      display: inline-block;
    }

    .result {
      font-size: 24px;
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="test-page">

  <a href="javascript:history.back()" class="back-btn">← Артқа</a>

  <h1 id="testTitle">Тест</h1>

  <div id="testContainer"></div>

  <div class="actions">
    <button class="submit-btn" onclick="checkTest()">Тексеру</button>
    <button class="retry-btn" onclick="retryTest()">Қайта тапсыру</button>
    <a href="subject-biology.html" class="back-btn2">Бөлімдерге қайту</a>
  </div>

  <div class="result" id="result"></div>

</div>

<script src="tests-data.js"></script>
<script src="test.js"></script>

</body>
</html>
