<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ағылшын тілі сабағы</title>
  <link rel="stylesheet" href="../css/lessons.css" />
</head>
<body>
  <div class="lesson-page">
    <div class="lesson-container">
      <a href="#" class="back-link" id="back-link">← Сабақтар тізіміне қайту</a>

      <div class="lesson-card">
        <p class="lesson-label">Ағылшын тілі сабағы</p>
        <h1 id="lesson-title">Жүктелуде...</h1>
        <p id="lesson-description" class="lesson-description"></p>
      </div>

      <div class="video-card">
        <h2>Видео сабақ</h2>
        <div class="video-wrapper" id="video-container">
          <p class="empty-text">Видео жүктелуде...</p>
        </div>
      </div>

      <div class="summary-card">
        <h2>Конспект</h2>
        <div id="lesson-summary" class="lesson-summary">
          <p class="empty-text">Материал жүктелуде...</p>
        </div>
      </div>

      <div class="lesson-actions">
        <a href="#" class="secondary-btn" id="lesson-list-btn">← Сабақтар тізімі</a>
        <a href="#" class="primary-btn" id="test-btn">Тест тапсыру →</a>
      </div>
    </div>
  </div>

  <script src="../js/lesson.js"></script>
</body>
</html>
