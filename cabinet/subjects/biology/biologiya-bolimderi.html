<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Биология бөлімдері</title>
  <link rel="stylesheet" href="css/biologiya-bolimderi.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar" id="sidebar">
      <h2 class="logo">MAGISTER</h2>

      <ul class="menu">
        <li><a href="../../index.html">🏠 Кабинет</a></li>
        <li><a href="../../profile.html">👤 Профиль</a></li>
        <li><a href="../../subjects.html">📚 Пәндер</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="header">
        <div class="page-title-box">
          <button class="menu-toggle" id="menu-toggle" type="button">☰</button>
          <div>
            <a href="../../subjects.html" class="back-link">← Пәндерге қайту</a>
            <h1>Биология бөлімдері</h1>
            <p class="subjects-subtitle">Биология пәні бойынша бөлімдер тізімі</p>
          </div>
        </div>

        <button class="logout" type="button" onclick="window.location.href='../../index.html'">
          Шығу
        </button>
      </div>

      <div class="cards biology-sections" id="sections-container">
        <!-- Бөлімдер JS арқылы шығады -->
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://ewpouavcxepprlhppyal.supabase.co";
    const supabaseKey = "sb_publishable__L6lwv9FNWNDYeLMD1SK2g_PU6Gn-EW";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const sidebar = document.getElementById("sidebar");
    const menuToggle = document.getElementById("menu-toggle");

    if (menuToggle && sidebar) {
      menuToggle.addEventListener("click", () => {
        sidebar.classList.toggle("hidden");
      });
    }

    async function loadSections() {
      try {
        const { data, error } = await supabaseClient
          .from("sections")
          .select("*")
          .eq("subject", "biology")
          .order("sort_order", { ascending: true });

        if (error) {
          throw error;
        }

        const container = document.getElementById("sections-container");
        if (!container) return;

        container.innerHTML = "";

        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="card subject-card">
              <h3>Бөлімдер жоқ</h3>
              <p>Бұл пәнге бөлімдер әлі қосылмаған.</p>
            </div>
          `;
          return;
        }

        data.forEach((section) => {
          const card = document.createElement("div");
          card.className = "card subject-card";

          card.innerHTML = `
            <h3>📘 ${section.title}</h3>
            <p>Бөлім материалдарын ашу үшін төмендегі батырманы басыңыз.</p>
            <a href="pages/lesson-list.html?section=${section.id}" class="open-btn">Ашу</a>
          `;

          container.appendChild(card);
        });
      } catch (error) {
        console.error("Бөлімдерді жүктеу қатесі:", error);

        const container = document.getElementById("sections-container");
        if (container) {
          container.innerHTML = `
            <div class="card subject-card">
              <h3>Қате</h3>
              <p>Бөлімдер Supabase-тен жүктелмеді.</p>
            </div>
          `;
        }
      }
    }

    loadSections();
  </script>
</body>
</html>
