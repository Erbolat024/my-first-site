<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сабақтар</title>
  <link rel="stylesheet" href="cabinet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fb;
    }

    .lesson-page {
      padding: 40px;
      min-height: 100vh;
    }

    .lesson-header {
      margin-bottom: 30px;
    }

    .lesson-header h1 {
      font-size: 46px;
      margin: 0 0 10px;
      color: #222;
    }

    .lesson-header p {
      font-size: 20px;
      margin: 0;
      color: #666;
    }

    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .lesson-card {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .lesson-card h3 {
      margin: 0 0 10px;
      font-size: 24px;
      color: #222;
    }

    .lesson-card p {
      margin: 0 0 12px;
      font-size: 18px;
      color: #666;
    }

    .lesson-status {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    .status-not-started {
      background: #f3f4f6;
      color: #6b7280;
    }

    .status-passed {
      background: #dcfce7;
      color: #166534;
    }

    .status-failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .lesson-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .lesson-btn {
      display: inline-block;
      text-decoration: none;
      background: #4c7cf6;
      color: white;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .lesson-btn:hover {
      background: #356df3;
    }

    .secondary-btn {
      background: #ffffff;
      color: #4c7cf6;
      border: 2px solid #4c7cf6;
    }

    .secondary-btn:hover {
      background: #eef4ff;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      color: #4c7cf6;
      font-size: 18px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .lesson-page {
        padding: 20px;
      }

      .lessons-grid {
        grid-template-columns: 1fr;
      }

      .lesson-header h1 {
        font-size: 32px;
      }

      .lesson-actions {
        flex-direction: column;
      }

      .lesson-btn {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="lesson-page">
    <a href="subject-biology.html" class="back-btn">← Биологияға қайту</a>

    <div class="lesson-header">
      <h1 id="sectionTitle">Бөлім</h1>
      <p id="sectionDesc">Сабақтар тізімі</p>
    </div>

    <div class="lessons-grid" id="lessonsContainer"></div>
  </div>

  <script src="lessons.js"></script>
</body>
</html>
